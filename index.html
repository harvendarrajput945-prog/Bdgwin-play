        .top-header {

        .menu-icon {

            gap: 5px;
            cursor: pointer;
        }

        .menu-icon span {
            display: block;
            width: 25px;
            height: 3px;
            background-color: #00a2e8;
        }

        /* Main Content Container */

            font-weight: bold;
            border-top: 2px solid #d4af37;
            border-bottom: 2px solid #d4af37;
            display: inline-block;
            padding: 5px 20px;
